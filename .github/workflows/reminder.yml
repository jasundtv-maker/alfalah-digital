name: Pengingat Al-Falah Digital

on:
  schedule:
    # Selasa 12:00 WIB
    - cron: '0 5 * * 2'

    # Minggu 20:00 WIB
    - cron: '0 13 * * 0'

    # Kamis 16:00 WIB
    - cron: '0 9 * * 4'

  workflow_dispatch:

jobs:
  pengingat:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Kirim Pengingat
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          DAY=$(date -u +%u)

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REMINDER_MODE=pengajian_laki python reminder.py
          elif [ "$DAY" = "2" ]; then
            REMINDER_MODE=pengajian_laki python reminder.py
          elif [ "$DAY" = "4" ]; then
            REMINDER_MODE=syahriahan python reminder.py
          elif [ "$DAY" = "7" ]; then
            REMINDER_MODE=pengajian_senin python reminder.py
          fi
