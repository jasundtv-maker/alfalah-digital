name: Al-Falah Digital V21 Auto

on:
  schedule:
    - cron: "0 13 * * 0"   # Minggu 20:00 WIB
    - cron: "0 5 * * 2"    # Selasa 12:00 WIB
    - cron: "0 9 * * 4"    # Kamis 16:00 WIB
    - cron: "0 1 1 * *"    # Tanggal 1 jam 08:00 WIB
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Tentukan endpoint
        run: |
          DOW=$(date -u +%u)
          DOM=$(date -u +%d)
          HOUR=$(date -u +%H)
          if [ "$DOM" = "01" ] && [ "$HOUR" = "01" ]; then
            echo "AUTO=laporan_bulanan" >> $GITHUB_ENV
          elif [ "$DOW" = "7" ]; then
            echo "AUTO=senenan" >> $GITHUB_ENV
          elif [ "$DOW" = "2" ]; then
            echo "AUTO=malam_rabu" >> $GITHUB_ENV
          elif [ "$DOW" = "4" ]; then
            echo "AUTO=syahriahan" >> $GITHUB_ENV
          else
            echo "AUTO=senenan" >> $GITHUB_ENV
          fi

      - name: Jalankan Auto Broadcast
        run: |
          curl -L "https://kas-masjid-alfalah.streamlit.app/?auto=${AUTO}&run=1"
